{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Controle de Gastos</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module"> import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js"; 
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyAk-COuyv4S_IMpR5BNIxj5TuBMEjRrUjA",
    authDomain: "controle-de-gastos-3b673.firebaseapp.com",
    projectId: "controle-de-gastos-3b673",
    storageBucket: "controle-de-gastos-3b673.firebasestorage.app",
    messagingSenderId: "317909595870",
    appId: "1:317909595870:web:3bc5d03813358b0173b44f",
    measurementId: "G-749YCJ1L3M"
  };
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);

  async function salvarTransacao(transacao) {
    await addDoc(collection(db, "transacoes"), transacao);
    console.log("Salvo!");
  }
  async function carregarTransacoes() {
    const querySnapshot = await getDocs(collection(db, "transacoes"));
    let lista=[];
    querySnapshot.forEach((doc) => {
      lista.push(doc.data());
    });
    console.log(lista);
  }
  window.salvarTransacao = salvarTransacao;
  window.carregarTransacoes = carregarTransacoes;
  </script>

</head>

<body>
    <h1 class="titulo">Controle Financeiro</h1>


    <div class="container">
        <h1> Meus Gastos</h1>

    <form id="formGasto" onsubmit="return false;">
        {% csrf_token %}
        <input type="number" name="valor" placeholder="Valor" step="0.001" required>
        <select class="descricao" name="descricao" required>
            <option value="">Selecione uma descrição</option>
            <option value="Alimentação">Alimentação</option>
            <option value="Transporte">Transporte</option>
            <option value="Academia">Academia</option>
            <option value="Lazer">Lazer</option>
        </select>
        <button type="submit" id="btnSalvar">+</button>
    </form>
    <script>
    document.getElementById("btnSalvar").addEventListener("click", async function() {

    const valor = document.querySelector('input[name="valor"]').value;
    const descricao = document.querySelector('select[name="descricao"]').value;

    const transacao = {
        valor: parseFloat(valor),
        descricao: descricao
    }});
</script>
    </div>
    <div class="layout">
    <div class="tabela-numero">
        <table>
            <tr>
                <th>Valor</th>
                <th>Descrição</th>
            </tr>
            {% for gasto in gastos %}
            <tr>
                <td>{{ gasto.valor }}</td>
                <td>{{ gasto.descricao }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

<div class="grafico-box">
    <div style="width: 400px; margin: 30px auto;">
        <canvas id="grafico"></canvas>
    </div>
</div>

    <script id="labels-data" type="application/json">
    {{ labels|default:"[]"|safe }}
</script>

<script id="valores-data" type="application/json">
    {{ valores|default:"[]"|safe }}
</script>

<script>
    const labels = JSON.parse(document.getElementById('labels-data').textContent);
    const data = JSON.parse(document.getElementById('valores-data').textContent);

    console.log("Labels:", labels);
    console.log("Data:", data);

    const ctx = document.getElementById('grafico');

    if (labels.length > 0) {
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: [
                        '#ff6384',
                        '#36a2eb',
                        '#ffce56',
                        '#4bc0c0',
                        '#9966ff',
                        '#ff9f40'
                    ]
                }]
            }
        });
    }
</script>
</html>
